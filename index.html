<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Industrial - Manutenção Torno</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        .font-tech { font-family: 'Share Tech Mono', monospace; }
        
        /* Estilos do seu Painel Lateral (Mantidos) */
        #info-panel {
            position: fixed; right: -400px; top: 0; bottom: 0; width: 350px;
            background: rgba(5, 10, 15, 0.95); border-left: 2px solid #00f3ff;
            z-index: 999; transition: right 0.4s; padding: 20px;
        }
        #info-panel.open { right: 0; }
        .ar-button {
            background: rgba(0, 243, 255, 0.2); border: 1px solid #00f3ff;
            color: #00f3ff; padding: 5px 10px; border-radius: 4px; cursor: pointer;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div class="fixed top-6 left-6 z-50 font-tech text-xs text-cyan-400 pointer-events-none">
        <div class="flex items-center gap-2 mb-1">
            <div class="w-3 h-3 bg-cyan-400 rounded-sm animate-pulse"></div>
            <span class="font-bold tracking-widest">AR_TRACKING: ACTIVE</span>
        </div>
        <div class="text-white">SCANNING FOR: TORNO_ROMI_V1</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-marker preset="hiro">
            
            <a-entity position="-1 0.5 0" 
                      geometry="primitive: sphere; radius: 0.1" 
                      material="color: #00f3ff; emissive: #00f3ff"
                      onclick="window.parent.openDetails('cabecote_fixo')">
                <a-text value="OLEO CABECOTE" position="0 0.2 0" align="center" width="2" font="monoid"></a-text>
            </a-entity>

            <a-entity position="0 0.2 1" 
                      geometry="primitive: sphere; radius: 0.1" 
                      material="color: #ffcc00; emissive: #ffcc00"
                      onclick="window.parent.openDetails('barramento')">
                <a-text value="GUIAS PRISMA" position="0 0.2 0" align="center" width="2"></a-text>
            </a-entity>

        </a-marker>

        <a-entity camera>
            <a-cursor color="#00f3ff"></a-cursor>
        </a-entity>
    </a-scene>

    <div id="info-panel" class="font-tech text-white">
        <h2 id="panel-title" class="text-xl text-cyan-400 mb-4">DETALHES</h2>
        <div id="panel-content" class="text-sm space-y-4">
            <p id="panel-lub" class="text-yellow-500"></p>
            <div id="panel-steps"></div>
        </div>
        <button onclick="closeDetails()" class="mt-8 w-full ar-button">FECHAR</button>
    </div>

    <script>
        const componentsData = {
            cabecote_fixo: {
                title: 'Óleo do Cabeçote Fixo',
                lub: 'Lubrificante: ISO VG 68',
                steps: ["Verificar nível no visor", "Adicionar via bujão superior"]
            },
            barramento: {
                title: 'Guias Prisma',
                lub: 'Lubrificante: Óleo para Guias',
                steps: ["Limpar cavacos", "Aplicar fina camada de óleo"]
            }
        };

        function openDetails(key) {
            const data = componentsData[key];
            document.getElementById('panel-title').innerText = data.title;
            document.getElementById('panel-lub').innerText = data.lub;
            document.getElementById('panel-steps').innerHTML = data.steps.map(s => `• ${s}<br>`).join('');
            document.getElementById('info-panel').classList.add('open');
        }

        function closeDetails() {
            document.getElementById('info-panel').classList.remove('open');
        }
    </script>
</body>
</html>
